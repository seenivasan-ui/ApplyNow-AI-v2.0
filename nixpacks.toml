[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "nodejs_20", "chromium", "nss", "nspr", "atk", "at-spi2-atk", "xorg.libX11", "xorg.libxcb", "xorg.libXcomposite", "xorg.libXcursor", "xorg.libXdamage", "xorg.libXext", "xorg.libXfixes", "xorg.libXi", "xorg.libXrandr", "xorg.libXrender", "xorg.libXtst", "xorg.libXScrnSaver", "libxkbcommon", "mesa", "expat", "glib", "pango", "cairo", "alsa-lib", "cups", "dbus", "fontconfig", "freetype"]

[phases.install]
cmds = [
  "pip3 install -r backend/requirements.txt",
  "cd frontend && npm install && npm run build"
]

[start]
cmd = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
