[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = [
  "python3 -m venv venv",
  ". venv/bin/activate && pip install -r backend/requirements.txt",
  "cd frontend && npm install && npm run build"
]

[start]
cmd = ". venv/bin/activate && cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"